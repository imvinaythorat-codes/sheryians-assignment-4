<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio-Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="portfolio">
        <aside>
            <nav>
                <h2>Podcast</h2>
                <h2>Portfolio</h2>
                <h2>Research</h2>
                <h2>Client</h2>
            </nav>
        </aside>
        <aside class="portfolio-card">
            <div class="about-me">About Me</div>
            <div class="pp-img">
                <div class="img">
                    <img src="profile-pic.png" alt="Profile Picture" class="profile-picture">
                </div>
                <div class="name">Im'<br><span>John<br>Daneil</span></div>
                <div class="email">john.doe@example.com</div> 
            </div>
            
        </aside>
        <main class="content">
            <div class="heading">Portfolio</div>
            <div class="video-card">
                <img src="hero-pic.jfif" alt="Hero Image">
            </div>
            <div class="stats">
                <div class="project-count"> <span>251</span><br><h2>Projects</h2> </div>
                <div class="award-count"><span>156</span><br><h2>Awards</h2></div>
            </div>
            <div class="client-card">Clients</div>
            <div class="ball-card"><img src="sphere-pic.png" alt=""></div>
            <div class="global-award"><span>172</span><br><h2>Global<br>Awards</h2></div>        
        </main>
    </div>
</body>
</html>
